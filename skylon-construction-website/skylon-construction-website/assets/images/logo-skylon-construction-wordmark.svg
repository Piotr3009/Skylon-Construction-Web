<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" width="420" height="150" role="img" aria-label="Skylon Construction">
  <title>Skylon Construction</title>
  <defs>
    <linearGradient id="silverText" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7f8891"/>
      <stop offset="0.24" stop-color="#f2f4f5"/>
      <stop offset="0.5" stop-color="#b7bec6"/>
      <stop offset="0.78" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#737d87"/>
    </linearGradient>
    <linearGradient id="silverLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#66717c" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#dce1e5"/>
      <stop offset="0.5" stop-color="#aab3bc"/>
      <stop offset="0.82" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#66717c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="92" y1="62" x2="328" y2="62" stroke="url(#silverLine)" stroke-width="1.8"/>

  <text x="210" y="83"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42"
        font-weight="400"
        letter-spacing="13"
        fill="url(#silverText)">SKYLON</text>

  <line x1="100" y1="91" x2="320" y2="91" stroke="url(#silverLine)" stroke-width="1.5"/>

  <text x="210" y="116"
        text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="13"
        font-weight="500"
        letter-spacing="8"
        fill="#c4cad1">CONSTRUCTION</text>
